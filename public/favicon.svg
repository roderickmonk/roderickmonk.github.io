<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- Subtle graph-paper grid (echoes the site's math background) -->
  <g stroke="white" stroke-width="0.5" opacity="0.12">
    <line x1="16" y1="0" x2="16" y2="64"/>
    <line x1="32" y1="0" x2="32" y2="64"/>
    <line x1="48" y1="0" x2="48" y2="64"/>
    <line x1="0" y1="16" x2="64" y2="16"/>
    <line x1="0" y1="32" x2="64" y2="32"/>
    <line x1="0" y1="48" x2="64" y2="48"/>
  </g>

  <!-- Thin inner border for polish -->
  <rect x="2" y="2" width="60" height="60" rx="11"
        fill="none" stroke="white" stroke-width="0.75" opacity="0.2"/>

  <!-- Lowercase sigma — standard deviation, formal-language alphabets,
       and the very σ in z = (x−μ)/σ floating on the site's background -->
  <text x="33" y="48"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="46"
        fill="white"
        opacity="0.95">σ</text>
</svg>
